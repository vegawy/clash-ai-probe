<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add/Edit Proxy - ProxySentinel AI</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Custom Scrollbar for Industrial Look */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0D1117; 
        }
        ::-webkit-scrollbar-thumb {
            background: #30363D; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #45474b; 
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-primary": "#5b5e66",
                        "surface-variant": "#353435",
                        "on-tertiary-fixed": "#07006c",
                        "secondary-fixed-dim": "#4edea3",
                        "on-tertiary-container": "#686cf7",
                        "inverse-surface": "#e5e2e2",
                        "on-secondary-fixed": "#002113",
                        "on-surface-variant": "#c6c6cb",
                        "tertiary-fixed": "#e1e0ff",
                        "on-primary-container": "#797d85",
                        "surface-container-lowest": "#0e0e0f",
                        "primary-container": "#0d1117",
                        "on-tertiary-fixed-variant": "#2f2ebe",
                        "surface-container-high": "#2a2a2a",
                        "on-secondary-container": "#00311f",
                        "error-container": "#93000a",
                        "surface-container-highest": "#353435",
                        "error": "#ffb4ab",
                        "primary-fixed": "#dfe2eb",
                        "on-tertiary": "#1000a9",
                        "surface-container": "#201f20",
                        "background": "#131314",
                        "on-surface": "#e5e2e2",
                        "surface-bright": "#3a3939",
                        "surface-container-low": "#1c1b1c",
                        "primary": "#c3c6cf",
                        "on-secondary-fixed-variant": "#005236",
                        "on-background": "#e5e2e2",
                        "primary-fixed-dim": "#c3c6cf",
                        "on-primary": "#2d3137",
                        "on-primary-fixed-variant": "#43474e",
                        "outline-variant": "#45474b",
                        "on-error-container": "#ffdad6",
                        "secondary-fixed": "#6ffbbe",
                        "surface-tint": "#c3c6cf",
                        "outline": "#8f9095",
                        "on-primary-fixed": "#181c22",
                        "tertiary-fixed-dim": "#c0c1ff",
                        "surface-dim": "#131314",
                        "secondary-container": "#00a572",
                        "tertiary": "#c0c1ff",
                        "tertiary-container": "#03004c",
                        "on-error": "#690005",
                        "surface": "#131314",
                        "inverse-on-surface": "#313031",
                        "secondary": "#4edea3",
                        "on-secondary": "#003824",
                        
                        /* Form Specific Extras */
                        "form-bg": "#161B22",
                        "form-border": "#30363D",
                        "form-hover": "#1C2128",
                        "accent-indigo": "#6366F1"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "unit": "4px",
                        "gutter": "16px",
                        "density-compact": "4px",
                        "container-padding": "24px",
                        "sidebar-width": "240px",
                        "density-comfortable": "12px"
                    },
                    "fontFamily": {
                        "headline-md": ["Inter"],
                        "mono-data": ["JetBrains Mono"],
                        "label-caps": ["Inter"],
                        "display-lg": ["Inter"],
                        "display-lg-mobile": ["Inter"],
                        "body-sm": ["Inter"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "headline-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "mono-data": ["13px", { "lineHeight": "18px", "fontWeight": "500" }],
                        "label-caps": ["11px", { "lineHeight": "12px", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "display-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "display-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "body-sm": ["12px", { "lineHeight": "16px", "fontWeight": "400" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-surface font-body-md min-h-screen flex items-center justify-center p-gutter">
<!-- Modal Backdrop -->
<div class="fixed inset-0 bg-primary-container/80 backdrop-blur-sm z-40 flex items-center justify-center p-4">
<!-- Modal Container -->
<div class="bg-form-bg border border-form-border rounded-lg shadow-[0_4px_24px_rgba(0,0,0,0.5)] w-full max-w-3xl z-50 flex flex-col max-h-[921px]">
<!-- Modal Header -->
<div class="flex items-center justify-between px-6 py-4 border-b border-form-border">
<div>
<h2 class="font-headline-md text-headline-md text-on-surface">Configure Proxy Node</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-1">Define routing parameters and authentication for this target.</p>
</div>
<button class="text-on-surface-variant hover:text-on-surface transition-colors">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
<!-- Modal Body (Scrollable) -->
<div class="p-6 overflow-y-auto custom-scrollbar flex-1">
<form class="space-y-6">
<!-- Top Grid: Basic Info -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Name Field -->
<div class="space-y-2">
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest">Node Name</label>
<input class="w-full bg-surface-container-lowest border border-form-border rounded text-on-surface font-body-md px-3 py-2 focus:outline-none focus:ring-1 focus:ring-accent-indigo focus:border-accent-indigo placeholder-on-surface-variant/50 transition-shadow" placeholder="e.g., US-East-Primary" type="text"/>
</div>
<!-- Model Selection -->
<div class="space-y-2">
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest">Target Model</label>
<div class="relative">
<select class="w-full bg-surface-container-lowest border border-form-border rounded text-on-surface font-body-md px-3 py-2 appearance-none focus:outline-none focus:ring-1 focus:ring-accent-indigo focus:border-accent-indigo transition-shadow">
<option disabled="" selected="" value="">Select LLM Architecture</option>
<option value="gpt-4">GPT-4 Turbo</option>
<option value="gpt-3.5">GPT-3.5</option>
<option value="claude-3">Claude 3 Opus</option>
<option value="llama-3">Llama 3 70B</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-2.5 text-on-surface-variant pointer-events-none" data-icon="arrow_drop_down">arrow_drop_down</span>
</div>
</div>
</div>
<!-- Base URL -->
<div class="space-y-2">
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest">Base Endpoint URL</label>
<div class="flex">
<span class="inline-flex items-center px-3 rounded-l border border-r-0 border-form-border bg-surface-container text-on-surface-variant font-mono-data text-mono-data">
                                https://
                            </span>
<input class="flex-1 bg-surface-container-lowest border border-form-border rounded-r text-on-surface font-mono-data text-mono-data px-3 py-2 focus:outline-none focus:ring-1 focus:ring-accent-indigo focus:border-accent-indigo placeholder-on-surface-variant/50 transition-shadow" placeholder="api.provider.com/v1" type="text"/>
</div>
</div>
<!-- API Key Section -->
<div class="space-y-2 border border-form-border p-4 rounded bg-surface-container/30">
<div class="flex justify-between items-end mb-2">
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest">Authentication Key</label>
<button class="font-body-sm text-body-sm text-error hover:text-error-container transition-colors flex items-center gap-1" type="button">
<span class="material-symbols-outlined text-[16px]" data-icon="delete">delete</span> Clear Key
                            </button>
</div>
<div class="relative">
<input class="w-full bg-surface-container-lowest border border-form-border rounded text-on-surface font-mono-data text-mono-data px-3 py-2 pr-10 focus:outline-none focus:ring-1 focus:ring-accent-indigo focus:border-accent-indigo placeholder-on-surface-variant/50 transition-shadow" placeholder="sk-..." type="password" value="sk-xxxxxxxxxxxxxxxxxxxxxxxx"/>
<button class="absolute right-3 top-2 text-on-surface-variant hover:text-on-surface" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-1">Stored securely in the secrets vault. Will be injected via Authorization Bearer header.</p>
</div>
<!-- Technical Parameters Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Timeout -->
<div class="space-y-2">
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest">Connection Timeout</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border border-form-border rounded text-on-surface font-mono-data text-mono-data px-3 py-2 pr-12 focus:outline-none focus:ring-1 focus:ring-accent-indigo focus:border-accent-indigo transition-shadow" placeholder="30000" type="number" value="30000"/>
<span class="absolute right-3 top-2 font-mono-data text-mono-data text-on-surface-variant">ms</span>
</div>
</div>
<!-- Auto-Detect Toggle -->
<div class="space-y-2 flex flex-col justify-center pt-6">
<label class="flex items-center cursor-pointer group">
<div class="relative">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-10 h-5 bg-surface-container-highest rounded-full peer peer-checked:bg-secondary-container transition-colors border border-form-border"></div>
<div class="absolute left-1 top-1 bg-on-surface w-3 h-3 rounded-full transition-transform peer-checked:translate-x-5"></div>
</div>
<span class="ml-3 font-body-md text-body-md text-on-surface group-hover:text-primary transition-colors">Enable Health Auto-Detect</span>
</label>
</div>
</div>
<!-- Frequency Control Area -->
<div class="border-t border-form-border pt-6 space-y-4">
<h3 class="font-headline-md text-[16px] text-on-surface">Rate Limiting</h3>
<label class="flex items-center cursor-pointer group mb-4">
<div class="relative">
<input class="sr-only peer" type="checkbox"/>
<div class="w-10 h-5 bg-surface-container-highest rounded-full peer peer-checked:bg-secondary-container transition-colors border border-form-border"></div>
<div class="absolute left-1 top-1 bg-on-surface w-3 h-3 rounded-full transition-transform peer-checked:translate-x-5"></div>
</div>
<span class="ml-3 font-body-md text-body-md text-on-surface group-hover:text-primary transition-colors">Override Global Frequency Limits</span>
</label>
<!-- Override Selector (Disabled state visually represented) -->
<div class="space-y-2 opacity-50 pointer-events-none">
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest">Custom Requests Per Minute (RPM)</label>
<input class="w-full md:w-1/2 bg-surface-container-lowest border border-form-border rounded text-on-surface font-mono-data text-mono-data px-3 py-2 focus:outline-none transition-shadow" disabled="" placeholder="60" type="number"/>
</div>
</div>
<!-- Test Prompt -->
<div class="space-y-2 border-t border-form-border pt-6">
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest">Health Check Prompt Payload</label>
<textarea class="w-full bg-surface-container-lowest border border-form-border rounded text-on-surface font-mono-data text-mono-data px-3 py-2 focus:outline-none focus:ring-1 focus:ring-accent-indigo focus:border-accent-indigo placeholder-on-surface-variant/50 transition-shadow resize-y" placeholder='{"messages": [{"role": "user", "content": "Ping"}]}' rows="3"></textarea>
</div>
<!-- Remarks -->
<div class="space-y-2">
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest">Internal Remarks</label>
<textarea class="w-full bg-surface-container-lowest border border-form-border rounded text-on-surface font-body-md px-3 py-2 focus:outline-none focus:ring-1 focus:ring-accent-indigo focus:border-accent-indigo placeholder-on-surface-variant/50 transition-shadow resize-y" placeholder="Notes for other SREs regarding this node..." rows="2"></textarea>
</div>
</form>
</div>
<!-- Modal Footer / Actions -->
<div class="px-6 py-4 border-t border-form-border bg-surface-container/50 flex flex-col sm:flex-row justify-between items-center gap-4 rounded-b-lg">
<button class="w-full sm:w-auto px-4 py-2 border border-form-border text-on-surface hover:bg-form-hover rounded font-body-md text-body-md transition-colors" type="button">
                    Cancel
                </button>
<div class="flex flex-col sm:flex-row gap-3 w-full sm:w-auto">
<button class="w-full sm:w-auto px-4 py-2 bg-surface-container-highest border border-form-border text-on-surface hover:bg-form-hover rounded font-body-md text-body-md transition-colors flex items-center justify-center gap-2" type="button">
<span class="material-symbols-outlined text-[18px]" data-icon="science">science</span>
                        Test Connection
                    </button>
<button class="w-full sm:w-auto px-6 py-2 bg-accent-indigo text-white hover:bg-accent-indigo/90 rounded font-headline-md text-[14px] transition-colors shadow-sm" type="button">
                        Save Configuration
                    </button>
</div>
</div>
</div>
</div>
</body></html>
